services:
  push-service:
    image: "ghcr.io/aesuli/push_service:latest"
    container_name: push-service
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/data
      - ./config:/config
    command:
      - -c
      - /config/push_service.yaml
      - webui